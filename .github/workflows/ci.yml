name: Java CI with Gradle (Checkstyle & Test)
# 1. 트리거 조건 설정 (Main/Develop 브랜치에 변경이 생겼을 때)
on:
  push:
    branches: [ "main", "develop", "feature" ]
  pull_request:
    branches: [ "main", "develop", "feature" ]

permissions:
  contents: read

jobs:
  build:
    # 실행 환경 (Ubuntu 최신 버전)
    runs-on: ubuntu-latest

    steps:
      # 2. 리포지토리 코드 체크아웃
      - name: Checkout code
        uses: actions/checkout@v4

      # 3. Java 실행 환경 설정 (프로젝트 버전에 맞게 수정하세요)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle' # Gradle 의존성 캐싱으로 빌드 속도 향상

      # 4. Gradle 실행 권한 부여
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 5. Checkstyle 실행
      # Gradle은 보통 checkstyle 플러그인을 설정하면 'check'나 'checkstyleMain' 태스크로 실행합니다.
      - name: Run Checkstyle
        run: ./gradlew checkstyleMain checkstyleTest

      # 6. 테스트 코드 실행
      - name: Run Tests
        run: ./gradlew test

      # 7. (선택사항) 테스트 결과 리포트 업로드
      # 테스트가 실패하더라도 어디서 실패했는지 GitHub UI에서 편하게 볼 수 있도록 리포트를 저장합니다.
      - name: Upload Test Report
        if: always() # 테스트가 실패해도 항상 실행
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: build/reports/tests/test