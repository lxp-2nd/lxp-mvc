<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${title})}"></head>
<body>
<div th:replace="~{fragments/header :: appHeader(${title})}"></div>
<main class="container">
    <section class="section-heading">
        <h1>장바구니</h1>
        <p>신청 전 담아둔 강의를 확인하고 선택 신청합니다.</p>
    </section>

    <section class="empty-card" th:if="${#lists.isEmpty(cartItems)}">
        <h2>장바구니가 비어 있습니다.</h2>
        <p>관심 있는 강의를 장바구니에 담아보세요.</p>
        <a class="btn primary" th:href="@{/courses}">강의 보러가기</a>
    </section>

    <form id="cart-form"
          class="cart-layout"
          th:if="${!#lists.isEmpty(cartItems)}"
          method="post">
        <div class="cart-list">
            <article class="cart-item" th:each="cartItem : ${cartItems}">
                <input type="checkbox"
                       class="cart-item-checkbox"
                       th:value="${cartItem.cartItemId}"
                       th:data-course-id="${cartItem.courseId}"
                       aria-label="강의 선택">

                <div class="small-thumb">
                    <img th:src="${cartItem.thumbnailUrl}" alt="강의 썸네일">
                </div>

                <div>
                    <h2 th:text="${cartItem.courseTitle}">프론트엔드 입문</h2>
                    <p th:text="${cartItem.instructor}">강사명</p>
                    <p th:text="${cartItem.courseDescription}">강의 설명</p>
                    <p class="muted"
                       th:text="${cartItem.createdAt != null ? #temporals.format(cartItem.createdAt, 'yyyy-MM-dd HH:mm') : '담은 일시 없음'}">
                        2026-05-19 10:00
                    </p>
                </div>

                <button class="btn ghost"
                        type="submit"
                        data-submit-type="delete-one"
                        th:data-cart-item-id="${cartItem.cartItemId}">
                    삭제
                </button>
            </article>
        </div>

        <aside class="summary-card">
            <h2>선택 강의</h2>
            <p><strong id="selected-count">0</strong>개 강의 선택됨</p>
            <button class="btn ghost full"
                    type="submit"
                    data-submit-type="delete-selected">
                선택 강의 삭제
            </button>
            <button class="btn primary full"
                    type="submit"
                    data-submit-type="enroll">
                선택 강의 신청
            </button>
        </aside>
    </form>
</main>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const form = document.getElementById("cart-form");
        const checkboxes = document.querySelectorAll(".cart-item-checkbox");
        const selectedCount = document.getElementById("selected-count");

        if (!form || !selectedCount) {
            return;
        }

        const updateSelectedCount = () => {
            const count = Array.from(checkboxes)
                .filter((checkbox) => checkbox.checked)
                .length;

            selectedCount.textContent = count;
        };

        const removePreviousHiddenInputs = () => {
            form.querySelectorAll(".dynamic-selected-id")
                .forEach((input) => input.remove());
        };

        const appendHiddenInput = (name, value) => {
            const input = document.createElement("input");
            input.type = "hidden";
            input.name = name;
            input.value = value;
            input.className = "dynamic-selected-id";
            form.appendChild(input);
        };

        form.addEventListener("submit", (event) => {
            removePreviousHiddenInputs();

            const submitType = event.submitter.dataset.submitType;
            const selectedCheckboxes = Array.from(checkboxes)
                .filter((checkbox) => checkbox.checked);

            if (submitType === "delete-selected" && selectedCheckboxes.length === 0) {
                event.preventDefault();
                alert("삭제할 강의를 선택해주세요.");
                return;
            }

            if (submitType === "enroll" && selectedCheckboxes.length === 0) {
                event.preventDefault();
                alert("신청할 강의를 선택해주세요.");
                return;
            }

            if (submitType === "delete-one") {
                form.action = "/cart/items/delete";
                appendHiddenInput("cartItemIds", event.submitter.dataset.cartItemId);
                return;
            }

            if (submitType === "delete-selected") {
                form.action = "/cart/items/delete";

                selectedCheckboxes.forEach((checkbox) => {
                    appendHiddenInput("cartItemIds", checkbox.value);
                });

                return;
            }

            if (submitType === "enroll") {
                form.action = "/cart/enroll";

                selectedCheckboxes.forEach((checkbox) => {
                    appendHiddenInput("courseIds", checkbox.dataset.courseId);
                });
            }
        });

        checkboxes.forEach((checkbox) => {
            checkbox.addEventListener("change", updateSelectedCount);
        });

        updateSelectedCount();
    });
</script>
</body>
</html>
