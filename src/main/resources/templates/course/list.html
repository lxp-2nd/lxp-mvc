<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${title})}"></head>
<body>
<div th:replace="~{fragments/header :: appHeader(${title})}"></div>
<main class="container">
	<section class="section-heading">
		<h1>신청 가능한 무료 강의</h1>
		<p>신청 등록된 강의를 탐색하고 장바구니에 담거나 상세 정보를 확인합니다.</p>
	</section>

	<section class="course-grid" aria-label="강의 목록">
		<article class="course-card" th:each="course : ${courses}">
			<div class="thumb">강의 썸네일</div>
			<h2>
				<a th:href="@{/courses/{id}(id=${course.id})}" th:text="${course.title}">서비스 기획 MVP</a>
			</h2>
			<p th:text="${course.instructor}">강사명</p>
			<div class="course-card-footer">
				<p th:text="|${course.learnerCount}명 수강중|">n명 수강중</p>
				<a class="btn ghost" th:href="@{/courses/{id}(id=${course.id})}">상세 보기</a>
			</div>

		</article>
	</section>
</main>
</body>
</html>
