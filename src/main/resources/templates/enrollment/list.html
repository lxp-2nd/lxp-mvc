<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${title})}"></head>
<body>
<div th:replace="~{fragments/header :: appHeader(${title})}"></div>
<main class="container">
    <section class="section-heading">
        <h1>수강 목록</h1>
        <p>신청 완료된 강의를 확인합니다.</p>
    </section>

    <section class="enrolled-list">
        <article class="enrolled-item" th:each="enrollment : ${enrollments}">
            <div class="small-thumb">
                <img th:src="${enrollment.thumbnailUrl}" alt="강의 썸네일">
            </div>
            <div>
                <h2 th:text="${enrollment.courseTitle}">서비스 기획 MVP</h2>
                <p><span th:text="${enrollment.instructor}">강사명</span> · <span
                        th:text="'신청일(' + ${enrollment.createdAt} + ')'">신청됨</span></p>
            </div>
            <a class="btn primary" th:href="@{/courses/{id}(id=${enrollment.courseId})}">상세 보기</a>
        </article>
    </section>
</main>
</body>
</html>
