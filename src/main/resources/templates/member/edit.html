<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${title})}"></head>
<body>
<div th:replace="~{fragments/header :: appHeader(${title})}"></div>
<main class="container">
    <section class="section-heading">
        <h1>내 정보</h1>
    </section>

    <section class="profile-card">
        <p class="field-error" th:if="${errorMessage}" th:text="${errorMessage}"></p>
        <form id="profile-form" th:action="@{/profile}" th:object="${memberProfileRequest}" method="post"
              class="form-stack" novalidate>
            <label>닉네임
                <input th:field="*{nickname}" placeholder="닉네임 입력" autocomplete="nickname" required minlength="2"
                       maxlength="20"
                       th:aria-invalid="${#fields.hasErrors('nickname')} ? 'true' : 'false'"
                       aria-describedby="nickname-error"
                       data-error-required="닉네임을 입력해주세요."
                       data-error-minlength="닉네임은 2자 이상 입력해주세요."
                       data-error-maxlength="닉네임은 최대 20자까지 입력할 수 있습니다.">
                <span id="nickname-error" class="field-error" aria-live="polite">
                    <span th:if="${#fields.hasErrors('nickname')}" th:errors="*{nickname}"></span>
                </span>
            </label>
            <label>이메일<input th:value="${member.email}" readonly></label>
            <p class="helper">이메일은 MVP에서 수정할 수 없습니다.</p>
        </form>
        <div class="button-row">
            <form th:action="@{/profile}" th:method="delete" method="post">
                <button class="btn ghost" type="submit">회원 탈퇴</button>
            </form>
            <button class="btn primary" type="submit" form="profile-form">수정 저장</button>
        </div>
    </section>
</main>
<script>
    (() => {
        const form = document.querySelector(".form-stack");
        const nickname = form.querySelector("#nickname");

        const setError = (field, message) => {
            const error = document.getElementById(field.getAttribute("aria-describedby"));
            field.setAttribute("aria-invalid", message ? "true" : "false");
            error.textContent = message;
        };

        const getMessage = (field) => {
            if (field.validity.valueMissing) {
                return field.dataset.errorRequired;
            }

            if (field.validity.tooShort) {
                return field.dataset.errorMinlength;
            }

            if (field.validity.tooLong) {
                return field.dataset.errorMaxlength;
            }

            return "";
        };

        const validateField = (field) => {
            const message = getMessage(field);
            setError(field, message);
            return !message;
        };

        nickname.addEventListener("blur", () => validateField(nickname));
        nickname.addEventListener("input", () => validateField(nickname));

        form.addEventListener("submit", (event) => {
            if (!validateField(nickname)) {
                event.preventDefault();
                nickname.focus();
            }
        });
    })();
</script>
</body>
</html>
