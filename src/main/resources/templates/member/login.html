<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${title})}"></head>
<body>
<main class="auth-page">
	<h1 class="page-label standalone">로그인</h1>
	<section class="auth-card">
		<h2>LXP 로그인</h2>
		<form th:action="@{/login}" th:object="${loginRequest}" method="post" class="form-stack" novalidate>
			<label>이메일
				<input type="email" th:field="*{email}" placeholder="name@example.com" autocomplete="email" required
						aria-invalid="false" aria-describedby="email-error"
						data-error-required="이메일을 입력해주세요." data-error-invalid="올바른 이메일 형식으로 입력해주세요.">
				<span id="email-error" class="field-error" aria-live="polite"></span>
			</label>
			<label>비밀번호
				<input type="password" th:field="*{password}" placeholder="비밀번호 입력"
						autocomplete="current-password" required
						aria-invalid="false" aria-describedby="password-error"
						data-error-required="비밀번호를 입력해주세요.">
				<span id="password-error" class="field-error" aria-live="polite"></span>
			</label>
			<button class="btn primary" type="submit">로그인</button>
		</form>
		<p class="helper">계정이 없나요? <a th:href="@{/signup}">회원가입</a></p>
	</section>
</main>
<script>
	(() => {
		const form = document.querySelector(".form-stack");

		const setError = (field, message) => {
			const error = document.getElementById(field.getAttribute("aria-describedby"));
			field.setAttribute("aria-invalid", message ? "true" : "false");
			error.textContent = message;
		};

		const getMessage = (field) => {
			if (field.validity.valueMissing) {
				return field.dataset.errorRequired;
			}

			if (field.validity.typeMismatch) {
				return field.dataset.errorInvalid;
			}

			return "";
		};

		const validateField = (field) => {
			const message = getMessage(field);
			setError(field, message);
			return !message;
		};

		form.querySelectorAll("input").forEach((field) => {
			field.addEventListener("blur", () => validateField(field));
			field.addEventListener("input", () => validateField(field));
		});

		form.addEventListener("submit", (event) => {
			const fields = [...form.querySelectorAll("input")];
			const invalidFields = fields.filter((field) => !validateField(field));
			const firstInvalid = invalidFields[0];

			if (firstInvalid) {
				event.preventDefault();
				firstInvalid.focus();
			}
		});
	})();
</script>
</body>
</html>
